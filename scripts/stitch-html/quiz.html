<!DOCTYPE html>

<html class="dark" lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@100;300;400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-container": "#1d1f2a",
              "surface-container-lowest": "#0b0e18",
              "tertiary": "#e8a832",
              "tertiary-container": "#2b1f00",
              "background": "#11131e",
              "on-tertiary-fixed-variant": "#5a4400",
              "surface-container-low": "#191b26",
              "on-error-container": "#ffdad6",
              "on-primary-fixed": "#151a34",
              "on-secondary": "#412d00",
              "inverse-on-surface": "#2e303c",
              "secondary-fixed": "#ffdea7",
              "on-error": "#690005",
              "on-surface": "#e1e1f1",
              "secondary-fixed-dim": "#e8a832",
              "surface-container-highest": "#323440",
              "primary-fixed-dim": "#c0c4e8",
              "outline-variant": "#46464d",
              "on-primary-fixed-variant": "#404562",
              "on-surface-variant": "#c7c5ce",
              "primary-container": "#1a1f3a",
              "surface-tint": "#c0c4e8",
              "on-primary": "#2a2f4a",
              "on-primary-container": "#8286a7",
              "inverse-surface": "#e1e1f1",
              "on-secondary-container": "#392600",
              "on-background": "#e1e1f1",
              "surface-bright": "#373845",
              "error-container": "#93000a",
              "surface-dim": "#11131e",
              "surface-variant": "#323440",
              "error": "#ffb4ab",
              "on-secondary-fixed": "#271900",
              "tertiary-fixed-dim": "#e8a832",
              "on-tertiary-fixed": "#251a00",
              "primary": "#c0c4e8",
              "outline": "#919098",
              "on-tertiary": "#3e2e00",
              "on-secondary-fixed-variant": "#5e4200",
              "secondary-container": "#e8a832",
              "tertiary-fixed": "#ffdf96",
              "surface": "#11131e",
              "inverse-primary": "#585d7b",
              "surface-container-high": "#272935",
              "on-tertiary-container": "#a48431",
              "primary-fixed": "#dee1ff",
              "secondary": "#e8a832"
            },
            fontFamily: {
              "headline": ["Be Vietnam Pro"],
              "body": ["Be Vietnam Pro"],
              "label": ["Be Vietnam Pro"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .glass-panel {
        background: rgba(50, 52, 64, 0.6);
        backdrop-filter: blur(20px);
      }
      .gold-glow {
        box-shadow: 0 0 20px rgba(232, 168, 50, 0.2);
      }
    </style>
</head>
<body class="bg-surface font-body text-on-surface selection:bg-secondary selection:text-on-secondary overflow-hidden">
<!-- Top Navigation -->
<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-6 h-16 bg-surface-container-low border-b border-outline-variant/10">
<div class="flex items-center gap-3">
<button class="w-10 h-10 flex items-center justify-center rounded-xl hover:bg-surface-variant transition-colors">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="close">close</span>
</button>
<div class="flex flex-col">
<span class="text-[10px] font-bold uppercase tracking-wider text-secondary">Câu hỏi 12/20</span>
<span class="font-headline font-bold text-sm tracking-tight">Cựu Ước: Sáng Thế Ký</span>
</div>
</div>
<!-- Progress Bar Center -->
<div class="absolute left-1/2 -translate-x-1/2 w-full max-w-md px-4 hidden md:block text-center">
<div class="flex items-center gap-4">
<div class="h-2 flex-1 bg-primary-container rounded-full overflow-hidden">
<div class="h-full bg-gradient-to-r from-secondary to-tertiary w-[60%] shadow-[0_0_8px_rgba(232,168,50,0.4)]"></div>
</div>
<span class="text-[10px] font-black text-secondary whitespace-nowrap">12 / 20</span>
</div>
</div>
<div class="flex items-center gap-4">
<div class="flex items-center gap-2 bg-surface-container-high px-3 py-1.5 rounded-full border border-outline-variant/10">
<span class="material-symbols-outlined text-secondary text-lg" data-icon="bolt" style="font-variation-settings: 'FILL' 1;">bolt</span>
<span class="font-bold text-sm">1,240</span>
</div>
<div class="w-10 h-10 rounded-full overflow-hidden border-2 border-secondary/20">
<img alt="User profile avatar" class="w-full h-full object-cover" data-alt="Portrait of a young person smiling softly in warm golden light with a blurred library background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuA_gvTEPdS3FC12mWJyceznZhsGcAGYJB_EueUEXpzUz7h4Z5dyatjF8rBlRyPznJJcJDEvFTM3ToZQpjcfXwod8_KTpaT1q6lWul9bRGY-_gsVTWRghIfxNY2kkiDoop7Fj3qO_biHP4iGVG_p_kESrM5VIRSLcxeeOFE-WPdt1qmGF1iEHyyQvNl1kNjB9aDd4799WZMuaKj4C9Wd_QtJo5NemPaVvNQtuloOo5bJLZYOiWVKqIQ-F64yIh6OmTt9GIhzXrUVFjk"/>
</div>
</div>
</header>
<!-- Mobile Progress Bar -->
<div class="fixed top-16 left-0 w-full h-1 bg-primary-container md:hidden z-50">
<div class="h-full bg-gradient-to-r from-secondary to-tertiary w-[60%]"></div>
</div>
<main class="relative min-h-screen pt-24 pb-12 px-6 flex flex-col items-center justify-center max-w-5xl mx-auto">
<!-- Top Stats Row -->
<div class="w-full flex justify-between items-end mb-8">
<!-- Combo Counter -->
<div class="flex flex-col items-start gap-1">
<span class="text-[10px] font-bold uppercase tracking-[0.1em] text-on-surface-variant">Combo chuỗi</span>
<div class="flex items-center gap-2 glass-panel px-4 py-2 rounded-2xl border border-secondary/20 gold-glow">
<span class="material-symbols-outlined text-secondary" data-icon="stars" style="font-variation-settings: 'FILL' 1;">stars</span>
<span class="font-headline font-black text-2xl text-secondary italic">x5</span>
</div>
</div>
<!-- Energy Indicator -->
<div class="flex flex-col items-end gap-1">
<span class="text-[10px] font-bold uppercase tracking-[0.1em] text-on-surface-variant">Năng lượng</span>
<div class="flex gap-1">
<div class="w-2 h-6 rounded-full bg-secondary shadow-[0_0_10px_rgba(232,168,50,0.3)]"></div>
<div class="w-2 h-6 rounded-full bg-secondary shadow-[0_0_10px_rgba(232,168,50,0.3)]"></div>
<div class="w-2 h-6 rounded-full bg-secondary shadow-[0_0_10px_rgba(232,168,50,0.3)]"></div>
<div class="w-2 h-6 rounded-full bg-surface-container-highest"></div>
<div class="w-2 h-6 rounded-full bg-surface-container-highest"></div>
</div>
</div>
</div>
<!-- Question Section -->
<div class="w-full space-y-16 animate-fade-in">
<!-- Question Card -->
<div class="relative w-full aspect-[16/9] md:aspect-[21/7] flex flex-col items-center justify-center text-center p-10 bg-surface-container-low rounded-[2.5rem] border border-outline-variant/10 shadow-2xl overflow-hidden">
<div class="absolute top-0 left-0 w-full h-full opacity-5 pointer-events-none" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuDMCKO54ca-J7q0fk-t_5TFXWfAu4xiGTVWNWQrB4rg9F4qgAr0Qn-drTP-WZ8a2X3H48dmxrP8qNk75A1ZKSbp_y_z5DZIOO6F8W1WeA9xb-cb4oRGbIyRiyX2rvfSJv64OZ6-6jtYlrC3p-v9ALMkY_fIc9UNch7nTFCbMiHzQmUJtaauyoBx2CzPYJWh1yUsoIer_vQsG9nALOPHiYumzkTZ9rzYzj-95NCPlnanDAE3rH7zOECnkqSRJ_ifUTGYAYWpNS5mlmo');"></div>
<div class="absolute left-0 top-1/2 -translate-y-1/2 w-2 h-32 bg-secondary rounded-r-full"></div>
<h2 class="font-headline text-2xl md:text-4xl font-extrabold tracking-tight leading-snug max-w-3xl text-on-surface">
                    "Ai là người đã dẫn dắt dân Israel ra khỏi xứ Ê-díp-tô vượt qua Biển Đỏ?"
                </h2>
<div class="mt-8 flex items-center gap-2 text-on-surface-variant/60">
<span class="material-symbols-outlined text-sm" data-icon="menu_book">menu_book</span>
<span class="text-xs font-bold uppercase tracking-widest">Sách Xuất Ê-díp-tô Ký</span>
</div>
</div>
<!-- Answers Grid -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<!-- Option 1 -->
<button class="group relative flex items-center p-8 bg-surface-container hover:bg-surface-container-high border-2 border-transparent hover:border-outline-variant/20 rounded-[2rem] transition-all duration-300 text-left active:scale-[0.98]">
<div class="w-14 h-14 flex items-center justify-center bg-surface-container-highest rounded-2xl text-secondary font-black text-xl group-hover:bg-secondary group-hover:text-on-secondary transition-colors">A</div>
<span class="ml-6 font-bold text-xl text-on-surface">Tiên tri Áp-ra-ham</span>
</button>
<!-- Option 2 (Selected/Active State Example) -->
<button class="group relative flex items-center p-8 bg-secondary/10 border-2 border-secondary rounded-[2rem] transition-all duration-300 text-left gold-glow active:scale-[0.98]">
<div class="w-14 h-14 flex items-center justify-center bg-secondary rounded-2xl text-on-secondary font-black text-xl shadow-lg">B</div>
<span class="ml-6 font-bold text-xl text-secondary">Lãnh tụ Môi-se</span>
<div class="absolute right-8 top-1/2 -translate-y-1/2">
<span class="material-symbols-outlined text-secondary text-3xl" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</button>
<!-- Option 3 -->
<button class="group relative flex items-center p-8 bg-surface-container hover:bg-surface-container-high border-2 border-transparent hover:border-outline-variant/20 rounded-[2rem] transition-all duration-300 text-left active:scale-[0.98]">
<div class="w-14 h-14 flex items-center justify-center bg-surface-container-highest rounded-2xl text-secondary font-black text-xl group-hover:bg-secondary group-hover:text-on-secondary transition-colors">C</div>
<span class="ml-6 font-bold text-xl text-on-surface">Vua Đa-vít</span>
</button>
<!-- Option 4 -->
<button class="group relative flex items-center p-8 bg-surface-container hover:bg-surface-container-high border-2 border-transparent hover:border-outline-variant/20 rounded-[2rem] transition-all duration-300 text-left active:scale-[0.98]">
<div class="w-14 h-14 flex items-center justify-center bg-surface-container-highest rounded-2xl text-secondary font-black text-xl group-hover:bg-secondary group-hover:text-on-secondary transition-colors">D</div>
<span class="ml-6 font-bold text-xl text-on-surface">Tiên tri Ê-li</span>
</button>
</div>
</div>
<!-- Gameplay Footer -->
<div class="mt-16 w-full flex justify-between items-center opacity-80">
<button class="flex items-center gap-2 text-on-surface-variant hover:text-on-surface transition-colors">
<span class="material-symbols-outlined" data-icon="lightbulb">lightbulb</span>
<span class="text-xs font-bold uppercase tracking-widest">Gợi ý (2)</span>
</button>
<button class="flex items-center gap-2 text-on-surface-variant hover:text-on-surface transition-colors">
<span class="material-symbols-outlined" data-icon="groups">groups</span>
<span class="text-xs font-bold uppercase tracking-widest">Hỏi ý kiến</span>
</button>
<button class="flex items-center gap-2 text-on-surface-variant hover:text-on-surface transition-colors">
<span class="material-symbols-outlined" data-icon="skip_next">skip_next</span>
<span class="text-xs font-bold uppercase tracking-widest">Bỏ qua</span>
</button>
</div>
</main>
<!-- Background Decorative Elements -->
<div class="fixed top-0 left-0 w-full h-full pointer-events-none -z-10 overflow-hidden">
<div class="absolute top-[-10%] right-[-10%] w-[50%] h-[50%] bg-secondary/5 blur-[120px] rounded-full"></div>
<div class="absolute bottom-[-10%] left-[-10%] w-[50%] h-[50%] bg-primary/5 blur-[120px] rounded-full"></div>
</div>
<!-- Confirmation Modal / Next Question -->
<div class="fixed bottom-10 left-1/2 -translate-x-1/2 z-50 w-[calc(100%-3rem)] max-w-lg">
<div class="bg-surface-container-highest p-5 rounded-3xl border border-secondary/30 shadow-[0_20px_50px_rgba(0,0,0,0.5)] flex items-center justify-between gap-4 glass-panel">
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-full bg-secondary/20 flex items-center justify-center">
<span class="material-symbols-outlined text-secondary text-2xl" data-icon="verified" style="font-variation-settings: 'FILL' 1;">verified</span>
</div>
<div>
<p class="text-base font-bold text-on-surface">Chính xác!</p>
<p class="text-xs text-secondary/80 font-medium">+50 Điểm thưởng</p>
</div>
</div>
<button class="bg-gradient-to-r from-secondary to-tertiary text-on-secondary px-8 py-3 rounded-2xl font-black text-sm shadow-xl active:scale-95 transition-all hover:brightness-110">
                CÂU TIẾP THEO
            </button>
</div>
</div>
</body></html>
