server:
  port: 8080

spring:
  application:
    name: biblequiz-api

  jackson:
    deserialization:
      # Enforce whitelist on test fixture DTOs (SetStateRequest, etc.).
      # Any unknown field sent to a DTO annotated @JsonIgnoreProperties(ignoreUnknown=false)
      # will throw UnrecognizedPropertyException → GlobalExceptionHandler returns 400.
      fail-on-unknown-properties: true

  datasource:
    url: jdbc:mysql://localhost:3307/biblequiz?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8&useUnicode=true&connectionCollation=utf8mb4_unicode_ci
    username: root
    password: pass
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
    show-sql: false
  sql:
    init:
      mode: never

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope: openid,profile,email
            redirect-uri: ${OAUTH2_REDIRECT_URI:http://localhost:8080/login/oauth2/code/google}
        provider:
          google:
            user-name-attribute: sub

jwt:
  secret: ${JWT_SECRET:YmlibGVxdWl6LXN1cGVyLXNlY3JldC1qd3Qta2V5LTIwMjQtbWFrZS1pdC1sb25nLWFuZC1yYW5kb20tZm9yLXNlY3VyaXR5}
  expiration: ${JWT_EXPIRATION:900000}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:2592000000}

cors:
  allowed-origins: ${CORS_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost:5174}
  allowed-methods: GET,POST,PUT,DELETE,OPTIONS
  allowed-headers: "*"
  allow-credentials: true

logging:
  level:
    com.biblequiz: DEBUG
    org.springframework.security: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

app:
  frontend-url: ${FRONTEND_URL:http://localhost:5173}
  test-data:
    enabled: true
    reset: false
