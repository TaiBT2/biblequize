<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .score-ring {
            background: conic-gradient(from 0deg, #f8bd45 80%, #1d1f2a 80%);
        }
        .cross-watermark {
            mask-image: linear-gradient(to bottom, rgba(0,0,0,0) 0%, rgba(0,0,0,1) 50%, rgba(0,0,0,0) 100%);
            -webkit-mask-image: linear-gradient(to bottom, rgba(0,0,0,0) 0%, rgba(0,0,0,1) 50%, rgba(0,0,0,0) 100%);
        }

<body class="bg-surface-container-lowest flex items-center justify-center min-h-screen p-8 font-body">
<!-- Share Card Container (1200x630px) -->
<div class="relative w-[1200px] h-[630px] bg-gradient-to-b from-[#11131e] to-[#1d1f2a] overflow-hidden rounded-xl shadow-[0_32px_64px_rgba(0,0,0,0.5)] border border-outline-variant/10">
<!-- Subtle Cross Watermark -->
<div class="absolute inset-0 flex items-center justify-center opacity-[0.05] pointer-events-none cross-watermark">
<span class="material-symbols-outlined text-[400px] text-on-surface">church</span>
</div>
<!-- Corner Accents -->
<div class="absolute top-0 left-0 w-16 h-16 border-t-2 border-l-2 border-secondary/30 m-8 rounded-tl-lg"></div>
<div class="absolute bottom-0 right-0 w-16 h-16 border-b-2 border-r-2 border-secondary/30 m-8 rounded-br-lg"></div>
<!-- Header Section -->
<div class="absolute top-12 left-12 flex items-center gap-2">
<span class="text-3xl">🕊️</span>
<span class="font-['Be_Vietnam_Pro'] text-2xl font-black tracking-tighter text-secondary">BibleQuiz</span>
</div>
<div class="absolute top-16 right-12">
<div class="h-1 w-24 bg-gradient-to-l from-secondary to-transparent rounded-full"></div>
</div>
<!-- Main Content (Center) -->
<div class="absolute inset-0 flex flex-col items-center justify-center mt-8">
<!-- Score Ring -->
<div class="relative w-64 h-64 flex items-center justify-center rounded-full p-2 bg-gradient-to-tr from-secondary to-tertiary">
<div class="w-full h-full bg-surface-container rounded-full flex flex-col items-center justify-center shadow-inner">
<span class="text-6xl font-black text-on-surface leading-none">8/10</span>
<span class="text-sm font-medium tracking-widest text-on-surface-variant/80 mt-2 uppercase">80% chính xác</span>
</div>
</div>
<!-- Achievement Badge -->
<div class="mt-8 px-8 py-2.5 bg-gradient-to-r from-secondary to-tertiary rounded-full shadow-[0_8px_24px_rgba(248,189,69,0.3)]">
<span class="text-on-secondary font-bold text-xl tracking-tight">Xuất sắc!</span>
</div>
<!-- Stats Row -->
<div class="mt-12 flex items-center gap-12 text-on-surface-variant font-medium">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-secondary" style="font-variation-settings: 'FILL' 1;">timer</span>
<span class="text-lg">2:34</span>
</div>
<div class="h-4 w-px bg-outline-variant/30"></div>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-secondary" style="font-variation-settings: 'FILL' 1;">star</span>
<span class="text-lg">150 XP</span>
</div>
<div class="h-4 w-px bg-outline-variant/30"></div>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-secondary" style="font-variation-settings: 'FILL' 1;">local_fire_department</span>
<span class="text-lg">7 ngày streak</span>
</div>
</div>
</div>
<!-- Footer Section (Left) -->
<div class="absolute bottom-12 left-12 flex items-center gap-4">
<div class="p-1 rounded-full border-2 border-secondary shadow-[0_0_12px_rgba(248,189,69,0.2)]">
<img alt="User avatar profile picture" class="w-16 h-16 rounded-full bg-surface-container-high object-cover" data-alt="Close-up portrait of a friendly man with short dark hair, wearing professional glasses, smiling softly against a dark studio background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCtgVcacbLYhg31uf6z3czQ3b3gt1Rqr3R9t1dt2F1sjg8aAQ-qJYjEiQBluQv8kSyeJHVc7wdmQBqEoEWyIuUfl0GmPnu4OikN9TYt41VwtLZvRDxgD2eqmraqTOuw8dKQYnhSGHJvDwxb5ysQA6C0DvxMkA3FStSyDlqm8dJrrlo2Rek24qjrylRqwfDJ_cGyTqx8hy5DKU8NKPyRJf32wZ9-jUJQxZqyiG9R8bxGFvY7usQ67RJ5LFSpQ47X3OBjZJqRabVZpf8"/>
</div>
<div class="flex flex-col">
<span class="text-2xl font-bold text-on-surface leading-none mb-1">Nguyễn A</span>
<div class="flex items-center gap-1.5 px-3 py-1 bg-secondary-container/20 rounded-lg border border-secondary/20">
<span class="material-symbols-outlined text-sm text-secondary" style="font-variation-settings: 'FILL' 1;">military_tech</span>
<span class="text-xs font-bold text-secondary uppercase tracking-widest">Hiền Triết</span>
</div>
</div>
</div>
<!-- Footer Section (Right) -->
<div class="absolute bottom-12 right-12">
<span class="text-on-surface-variant/40 font-medium tracking-[0.2em] text-sm uppercase">biblequiz.app</span>
</div>
<!-- Background Atmospheric Glows -->
<div class="absolute -top-24 -left-24 w-96 h-96 bg-secondary/5 blur-[120px] rounded-full"></div>
<div class="absolute -bottom-24 -right-24 w-96 h-96 bg-primary/5 blur-[120px] rounded-full"></div>
</div>
</body></html>
