<style>
        body {
            font-family: 'Be Vietnam Pro', sans-serif;
            background-color: #11131e;
            color: #e1e1f1;
            margin: 0;
            overflow-x: hidden;
        }

            background: rgba(50, 52, 64, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .gold-gradient {
            background: linear-gradient(135deg, #f8bd45 0%, #e7c268 100%);

<body class="bg-background text-on-surface min-h-screen flex flex-col">
<!-- Top Navigation Bar -->
<header class="bg-[#11131e] dark:bg-[#11131e] font-['Be_Vietnam_Pro'] tracking-tight flex justify-between items-center w-full px-8 py-4 max-w-full fixed top-0 z-50">
<div class="text-xl font-bold text-[#f8bd45] uppercase tracking-[0.05em]">BibleQuiz</div>
<div class="flex items-center gap-8">
<button class="text-[#e1e1f1] opacity-70 hover:text-[#f8bd45] transition-colors duration-200">Skip</button>
<button class="text-[#f8bd45] font-bold border-b-2 border-[#f8bd45] pb-1 hover:text-[#f8bd45] transition-colors duration-200 Active: scale-95 transition-transform">Login</button>
</div>
</header>
<main class="flex-grow flex items-center justify-center pt-16 px-6 md:px-12">
<!-- Two-column split layout -->
<div class="w-full max-w-7xl grid grid-cols-1 md:grid-cols-[1.5fr_1fr] gap-12 min-h-[700px] items-center">
<!-- Left: Hero Illustration (60%) -->
<div class="relative flex items-center justify-center group h-full">
<!-- Ambient Glow Background -->
<div class="absolute inset-0 bg-secondary/5 rounded-full blur-[120px] scale-75"></div>
<div class="relative w-full aspect-square max-w-[500px] flex items-center justify-center">
<!-- Glassmorphism Container for Illustration -->
<div class="absolute inset-0 glass-panel rounded-full opacity-20 border border-outline-variant/10"></div>
<!-- Stylized Spark/Light Particle -->
<div class="relative z-10 flex items-center justify-center">
<div class="absolute w-64 h-64 bg-secondary/20 rounded-full blur-3xl"></div>
<span class="material-symbols-outlined text-[180px] text-secondary filter drop-shadow-[0_0_30px_rgba(248,189,69,0.5)]" style="font-variation-settings: 'FILL' 1;">
                            flare
                        </span>
<!-- Secondary rays/sparkles -->
<span class="material-symbols-outlined absolute top-0 -right-8 text-4xl text-tertiary opacity-80" style="font-variation-settings: 'FILL' 1;">colors_spark</span>
<span class="material-symbols-outlined absolute bottom-12 -left-4 text-3xl text-secondary-fixed opacity-60" style="font-variation-settings: 'FILL' 1;">star</span>
</div>
<!-- Editorial Decorative Image (Subtle Background Image in Card) -->
<div class="absolute bottom-0 right-0 w-48 h-48 opacity-10 mix-blend-overlay pointer-events-none">
<img alt="" class="w-full h-full object-cover rounded-full" data-alt="abstract flowing golden light particles on a deep midnight blue background with soft bokeh effects and ethereal atmosphere" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBDEsyGjgJzXJOmpGudgAruwAwHT8ZiPv10JbEM0ntIvArBFkh1zjjUIkgVYb5FaVDNrgo9KmO2tx0vV3TEg4RpfCalM-snVRMPHrA0B0JRKo9F80wqlgB9urQv-oSIAoCCUtslIpgqKPZ7jrU5H2d8sLmeEdlvhOBXfNhMwwtSuZp6cLn5Z5-IfeDGx0Yl_lBg0-kUc8M_WGp9xsmFxJtn2KFJTjenvnyLWXR_dHvMqTNQXjo6n2IjB7BM3L2tbZgnwSNKmeeJGU4"/>
</div>
</div>
</div>
<!-- Right: Content Column (40%) -->
<div class="flex flex-col space-y-10 md:pl-8">
<!-- Step Indicator -->
<div class="flex flex-col space-y-2">
<span class="text-secondary font-bold tracking-[0.2em] text-sm uppercase">Step Indicator</span>
<h4 class="text-on-surface-variant font-medium text-lg tracking-widest">01 / 03</h4>
</div>
<!-- Text Content -->
<div class="space-y-6">
<h1 class="text-5xl md:text-6xl font-bold text-on-surface leading-[1.1] tracking-tight">
                        Chào mừng đến <span class="text-secondary">BibleQuiz</span>
</h1>
<p class="text-on-surface-variant text-lg leading-relaxed max-w-md">
                        Học Kinh Thánh qua quiz tương tác mỗi ngày. Khám phá Lời Chúa theo cách hoàn toàn mới.
                    </p>
</div>
<!-- Footer Interaction Area -->
<div class="flex flex-col space-y-12 pt-4">
<!-- Dots Indicator -->
<div class="flex items-center space-x-3">
<div class="h-1.5 w-10 gold-gradient rounded-full"></div>
<div class="h-1.5 w-2 bg-surface-container-highest rounded-full"></div>
<div class="h-1.5 w-2 bg-surface-container-highest rounded-full"></div>
</div>
<!-- Action Button -->
<div class="flex items-center">
<button class="gold-gradient text-on-secondary px-10 py-5 rounded-xl font-bold flex items-center gap-3 hover:opacity-90 transition-all duration-300 shadow-xl shadow-secondary/5 group">

                            <span class="material-symbols-outlined group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>

<div class="flex gap-8">

<a class="text-[#e1e1f1]/60 font-['Be_Vietnam_Pro'] text-sm tracking-wide hover:text-[#f8bd45] underline decoration-[#f8bd45]/30 transition-all duration-300" href="#">Terms of Service</a>
<a class="text-[#e1e1f1]/60 font-['Be_Vietnam_Pro'] text-sm tracking-wide hover:text-[#f8bd45] underline decoration-[#f8bd45]/30 transition-all duration-300" href="#">Help Center</a>
