        </h2>

<div class="relative px-8 py-4 bg-surface-container-low rounded-xl">

<p class="italic text-on-surface-variant font-body text-lg leading-relaxed">
                    "Hãy tìm, các ngươi sẽ gặp"
                </p>
<p class="mt-2 text-xs uppercase tracking-[0.2em] font-bold text-secondary/70 font-label">
                    Ma-thi-ơ 7:7
                </p>
</div>
</div>
