<!DOCTYPE html>

<html class="dark" lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface-container-high": "#272935",
                    "on-primary-fixed": "#151a34",
                    "on-error-container": "#ffdad6",
                    "surface-bright": "#373845",
                    "tertiary-fixed-dim": "#e7c268",
                    "on-tertiary": "#3e2e00",
                    "on-secondary": "#412d00",
                    "outline-variant": "#46464d",
                    "surface-container-low": "#191b26",
                    "on-tertiary-fixed-variant": "#5a4400",
                    "on-primary-container": "#8286a7",
                    "secondary-container": "#bc8709",
                    "on-background": "#e1e1f1",
                    "on-tertiary-container": "#a48431",
                    "primary": "#c0c4e8",
                    "surface-variant": "#323440",
                    "outline": "#919098",
                    "surface-tint": "#c0c4e8",
                    "primary-fixed-dim": "#c0c4e8",
                    "error": "#ffb4ab",
                    "background": "#11131e",
                    "surface-container-highest": "#323440",
                    "surface": "#11131e",
                    "on-primary-fixed-variant": "#404562",
                    "on-secondary-fixed": "#271900",
                    "primary-container": "#1a1f3a",
                    "on-surface": "#e1e1f1",
                    "on-secondary-fixed-variant": "#5e4200",
                    "on-surface-variant": "#c7c5ce",
                    "surface-container-lowest": "#0b0e18",
                    "on-primary": "#2a2f4a",
                    "on-error": "#690005",
                    "inverse-surface": "#e1e1f1",
                    "secondary-fixed": "#ffdea7",
                    "tertiary-container": "#2b1f00",
                    "on-secondary-container": "#392600",
                    "inverse-on-surface": "#2e303c",
                    "error-container": "#93000a",
                    "secondary-fixed-dim": "#f8bd45",
                    "surface-container": "#1d1f2a",
                    "primary-fixed": "#dee1ff",
                    "secondary": "#f8bd45",
                    "inverse-primary": "#585d7b",
                    "tertiary-fixed": "#ffdf96",
                    "surface-dim": "#11131e",
                    "on-tertiary-fixed": "#251a00",
                    "tertiary": "#e7c268"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Be Vietnam Pro"],
                    "body": ["Be Vietnam Pro"],
                    "label": ["Be Vietnam Pro"]
            }
          },
        },
      }
    </script>
<style>
        .glass-card {
            background: rgba(50, 52, 64, 0.6);
            backdrop-filter: blur(20px);
        }
        .gold-gradient-btn {
            background: linear-gradient(135deg, #f8bd45 0%, #e7c268 100%);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-background text-on-surface font-body min-h-screen flex flex-col">
<!-- TopNavBar -->
<nav class="bg-[#11131e] dark:bg-[#11131e] flex justify-between items-center w-full px-8 py-4 max-w-full sticky top-0 z-50">
<div class="text-xl font-bold text-[#f8bd45] uppercase tracking-[0.05em] font-['Be_Vietnam_Pro'] tracking-tight">
            BibleQuiz
        </div>
<div class="hidden md:flex items-center gap-8">
<a class="text-[#e1e1f1] opacity-70 hover:text-[#f8bd45] transition-colors duration-200 font-['Be_Vietnam_Pro'] tracking-tight" href="#">Home</a>
<a class="text-[#f8bd45] font-bold border-b-2 border-[#f8bd45] pb-1 font-['Be_Vietnam_Pro'] tracking-tight" href="#">Quiz</a>
<a class="text-[#e1e1f1] opacity-70 hover:text-[#f8bd45] transition-colors duration-200 font-['Be_Vietnam_Pro'] tracking-tight" href="#">Leaderboard</a>
</div>
<div class="flex items-center gap-4">
<button class="text-[#e1e1f1] opacity-70 hover:text-[#f8bd45] transition-colors duration-200 font-['Be_Vietnam_Pro'] tracking-tight">Skip</button>
<button class="gold-gradient-btn text-on-secondary px-6 py-2 rounded-xl font-bold Active: scale-95 transition-transform font-['Be_Vietnam_Pro'] tracking-tight">Login</button>
</div>
</nav>
<!-- Main Content Canvas -->
<main class="flex-grow flex items-center justify-center px-4 py-12">
<div class="w-full max-w-[720px] space-y-12">
<!-- Quiz Header & Progress -->
<div class="space-y-6">
<div class="flex justify-between items-end">
<div>
<span class="text-secondary font-bold text-sm tracking-[0.05em] uppercase block mb-1">Thử thách hôm nay</span>
<h1 class="text-3xl font-headline font-bold tracking-tight">Câu 1 / 3</h1>
</div>
<div class="text-on-surface-variant text-sm font-medium">33% Hoàn thành</div>
</div>
<!-- Progress Bar -->
<div class="h-3 w-full bg-primary-container rounded-full overflow-hidden">
<div class="h-full gold-gradient-btn w-1/3 rounded-full relative">
<div class="absolute inset-0 bg-secondary opacity-20 blur-sm"></div>
</div>
</div>
</div>
<!-- Question Card -->
<div class="glass-card rounded-xl p-10 md:p-16 border border-outline-variant/15 relative overflow-hidden">
<div class="absolute -top-12 -right-12 w-48 h-48 bg-secondary/5 rounded-full blur-3xl"></div>
<div class="relative z-10">
<div class="flex items-center gap-3 mb-6 text-secondary/80">
<span class="material-symbols-outlined">menu_book</span>
<span class="text-xs font-bold tracking-widest uppercase">Cựu Ước</span>
</div>
<h2 class="text-2xl md:text-3xl font-headline font-semibold leading-snug text-on-surface">
                        Sách đầu tiên trong Kinh Thánh là gì?
                    </h2>
</div>
<div class="absolute bottom-0 left-0 h-1 w-24 bg-secondary"></div>
</div>
<!-- Answer Options Grid -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<!-- Option A -->
<button class="group flex items-center gap-4 p-5 rounded-xl bg-surface-container-high border border-outline-variant/10 hover:bg-surface-variant transition-all duration-300 text-left Active: scale-95">
<span class="flex-shrink-0 w-10 h-10 flex items-center justify-center rounded-lg bg-surface-container-highest text-secondary font-bold group-hover:bg-secondary group-hover:text-on-secondary transition-colors">A</span>
<span class="text-lg font-medium">Sáng Thế Ký</span>
</button>
<!-- Option B -->
<button class="group flex items-center gap-4 p-5 rounded-xl bg-surface-container-high border border-outline-variant/10 hover:bg-surface-variant transition-all duration-300 text-left Active: scale-95">
<span class="flex-shrink-0 w-10 h-10 flex items-center justify-center rounded-lg bg-surface-container-highest text-secondary font-bold group-hover:bg-secondary group-hover:text-on-secondary transition-colors">B</span>
<span class="text-lg font-medium">Xuất Hành</span>
</button>
<!-- Option C -->
<button class="group flex items-center gap-4 p-5 rounded-xl bg-surface-container-high border border-outline-variant/10 hover:bg-surface-variant transition-all duration-300 text-left Active: scale-95">
<span class="flex-shrink-0 w-10 h-10 flex items-center justify-center rounded-lg bg-surface-container-highest text-secondary font-bold group-hover:bg-secondary group-hover:text-on-secondary transition-colors">C</span>
<span class="text-lg font-medium">Ma-thi-ơ</span>
</button>
<!-- Option D -->
<button class="group flex items-center gap-4 p-5 rounded-xl bg-surface-container-high border border-outline-variant/10 hover:bg-surface-variant transition-all duration-300 text-left Active: scale-95">
<span class="flex-shrink-0 w-10 h-10 flex items-center justify-center rounded-lg bg-surface-container-highest text-secondary font-bold group-hover:bg-secondary group-hover:text-on-secondary transition-colors">D</span>
<span class="text-lg font-medium">Thi Thiên</span>
</button>
</div>
<!-- Hint Section -->
<div class="flex justify-center items-center gap-6 pt-4">
<button class="flex items-center gap-2 text-on-surface-variant hover:text-secondary transition-colors text-sm font-medium">
<span class="material-symbols-outlined text-[20px]">lightbulb</span>
                    Gợi ý (50/50)
                </button>
<div class="h-4 w-[1px] bg-outline-variant/30"></div>
<button class="flex items-center gap-2 text-on-surface-variant hover:text-secondary transition-colors text-sm font-medium">
<span class="material-symbols-outlined text-[20px]">report</span>
                    Báo lỗi câu hỏi
                </button>
</div>
</div>
</main>
<!-- Footer -->
<footer class="bg-[#11131e] dark:bg-[#11131e] border-t border-[#46464d]/15 py-8 flex flex-col md:flex-row justify-between items-center px-12 w-full mt-auto">
<div class="mb-4 md:mb-0">
<span class="text-[#f8bd45] font-semibold font-['Be_Vietnam_Pro'] text-sm tracking-wide">BibleQuiz</span>
<span class="text-[#e1e1f1]/60 font-['Be_Vietnam_Pro'] text-sm tracking-wide ml-2">© 2024 BibleQuiz. The Sacred Path.</span>
</div>
<div class="flex gap-8">
<a class="text-[#e1e1f1]/60 hover:text-[#f8bd45] underline decoration-[#f8bd45]/30 transition-all duration-300 font-['Be_Vietnam_Pro'] text-sm tracking-wide" href="#">Privacy Policy</a>
<a class="text-[#e1e1f1]/60 hover:text-[#f8bd45] underline decoration-[#f8bd45]/30 transition-all duration-300 font-['Be_Vietnam_Pro'] text-sm tracking-wide" href="#">Terms of Service</a>
<a class="text-[#e1e1f1]/60 hover:text-[#f8bd45] underline decoration-[#f8bd45]/30 transition-all duration-300 font-['Be_Vietnam_Pro'] text-sm tracking-wide" href="#">Help Center</a>
</div>
</footer>
</body></html>
