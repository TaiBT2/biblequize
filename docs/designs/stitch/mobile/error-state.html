<body class="bg-surface font-body text-on-surface selection:bg-secondary/30 min-h-screen flex flex-col">
<!-- TopAppBar -->
<nav class="w-full sticky top-0 z-50 bg-[#11131e] flex items-center justify-between px-4 h-16">
<div class="flex items-center gap-4">
<button class="active:scale-95 duration-200 hover:bg-[#272935] transition-colors p-2 rounded-full">
<span class="material-symbols-outlined text-[#f8bd45]">arrow_back</span>
</button>
<h1 class="font-['Be_Vietnam_Pro'] font-bold text-lg tracking-tight text-[#e1e1f1]">Lỗi hệ thống</h1>
</div>
<div class="w-10"></div> <!-- Spacer for balance -->
</nav>
<!-- Error Canvas -->
<main class="flex-grow flex flex-col items-center justify-center px-6 text-center">
<!-- Illustration Area -->
<div class="relative mb-12">
<!-- Ambient Glow -->
<div class="absolute inset-0 bg-error/10 blur-[60px] rounded-full scale-150"></div>
<!-- Icon -->
<div class="relative z-10 flex flex-col items-center">
<span class="material-symbols-outlined text-[120px] leading-none text-[#e7c268]" style="font-variation-settings: 'wght' 200;">warning</span>
<!-- Decorative Sacred Element -->
<div class="mt-6 flex gap-2">
<div class="w-1 h-1 rounded-full bg-[#f8bd45]/40"></div>
<div class="w-1 h-1 rounded-full bg-[#f8bd45]/60"></div>
<div class="w-1 h-1 rounded-full bg-[#f8bd45]/40"></div>
</div>
</div>
</div>
<!-- Typography Section -->
<div class="max-w-xs mx-auto space-y-4">
<h2 class="text-2xl font-bold tracking-tight text-on-surface">Có lỗi xảy ra</h2>
<p class="text-sm text-on-surface-variant leading-relaxed opacity-80">
                Đừng lo, lỗi đã được ghi nhận. Thử lại sau ít phút.
            </p>
</div>
<!-- Action Section -->
<div class="mt-12 w-full max-w-xs space-y-6">
<button class="w-full gold-gradient text-on-secondary font-bold py-4 rounded-xl active:scale-95 transition-transform shadow-lg shadow-secondary/10">
                Thử lại
            </button>
<button class="w-full text-secondary text-sm font-medium hover:underline active:opacity-70 transition-opacity">
                Báo lỗi cho chúng tôi
            </button>
</div>
<!-- Background Editorial Detail -->
<div class="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 -z-10 pointer-events-none opacity-[0.03]">
<span class="text-[300px] font-black tracking-tighter select-none">500</span>
</div>
</main>
<!-- BottomNavBar (Suppressed/Disabled State Visualization) -->
<!-- Note: As per instructions, navigation shell is suppressed for transactional/error pages, but included as skeleton per request -->
<nav class="fixed bottom-0 w-full z-50 rounded-t-2xl bg-[#1d1f2a]/50 backdrop-blur-xl border-t border-white/5 opacity-50 grayscale pointer-events-none">
<div class="flex justify-around items-center h-20 pb-safe px-6">
<div class="flex flex-col items-center justify-center text-[#e1e1f1]/60 px-4 py-1">
<span class="material-symbols-outlined mb-1">home</span>
<span class="font-['Be_Vietnam_Pro'] text-[10px] uppercase tracking-[0.05em] font-medium">Home</span>
</div>
