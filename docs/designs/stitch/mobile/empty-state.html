<!DOCTYPE html>

<html class="dark" lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Trống - Sacred Modernist</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@100;300;400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "outline": "#919098",
                      "on-surface": "#e1e1f1",
                      "tertiary-container": "#2b1f00",
                      "surface-container": "#1d1f2a",
                      "surface-bright": "#373845",
                      "on-secondary-container": "#392600",
                      "surface-variant": "#323440",
                      "on-secondary-fixed": "#271900",
                      "tertiary-fixed": "#ffdf96",
                      "on-primary-fixed": "#151a34",
                      "background": "#11131e",
                      "surface": "#11131e",
                      "primary-fixed": "#dee1ff",
                      "surface-dim": "#11131e",
                      "outline-variant": "#46464d",
                      "surface-container-highest": "#323440",
                      "secondary": "#f8bd45",
                      "on-tertiary-fixed-variant": "#5a4400",
                      "on-secondary": "#412d00",
                      "tertiary-fixed-dim": "#e7c268",
                      "secondary-container": "#bc8709",
                      "on-tertiary-fixed": "#251a00",
                      "surface-container-low": "#191b26",
                      "inverse-surface": "#e1e1f1",
                      "on-error-container": "#ffdad6",
                      "on-secondary-fixed-variant": "#5e4200",
                      "on-tertiary-container": "#a48431",
                      "on-error": "#690005",
                      "on-surface-variant": "#c7c5ce",
                      "surface-container-lowest": "#0b0e18",
                      "inverse-primary": "#585d7b",
                      "tertiary": "#e7c268",
                      "on-primary-container": "#8286a7",
                      "on-tertiary": "#3e2e00",
                      "secondary-fixed-dim": "#f8bd45",
                      "secondary-fixed": "#ffdea7",
                      "on-primary": "#2a2f4a",
                      "error": "#ffb4ab",
                      "error-container": "#93000a",
                      "primary-container": "#1a1f3a",
                      "surface-tint": "#c0c4e8",
                      "primary": "#c0c4e8",
                      "on-background": "#e1e1f1",
                      "primary-fixed-dim": "#c0c4e8",

              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"
              },
              "fontFamily": {
                      "headline": ["Be Vietnam Pro"],
                      "body": ["Be Vietnam Pro"],
                      "label": ["Be Vietnam Pro"]
              }
            },
          },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        .gold-gradient {
            background: linear-gradient(135deg, #f8bd45 0%, #e7c268 100%);
        }
        .sacred-glow {
            box-shadow: 0 0 40px rgba(248, 189, 69, 0.1);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface font-body min-h-screen flex flex-col selection:bg-secondary/30">
<!-- TopAppBar -->
<header class="w-full sticky top-0 z-50 bg-[#1d1f2a] flex items-center justify-between px-4 h-16">
<div class="flex items-center gap-4">
<button class="hover:bg-[#272935] transition-colors p-2 rounded-full active:scale-95 duration-200 text-[#f8bd45]">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="font-['Be_Vietnam_Pro'] font-bold text-lg tracking-tight text-[#e1e1f1]">Trống</h1>
</div>
<div class="w-10"></div> <!-- Spacer for symmetry -->
</header>
<!-- Main Content: Empty State -->
<main class="flex-grow flex flex-col items-center justify-center px-8 text-center pb-20">
<!-- Illustration Container -->
<div class="relative mb-8 sacred-glow">
<div class="w-40 h-40 rounded-full bg-surface-container-high flex items-center justify-center relative overflow-hidden">
<!-- Abstract "Sacred" background element -->
<div class="absolute inset-0 opacity-10 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-secondary via-transparent to-transparent"></div>
<!-- Gold Line Art Icon -->
<span class="material-symbols-outlined text-[120px] text-secondary leading-none" style="font-variation-settings: 'wght' 100;">
                    menu_book
                </span>
</div>
<!-- Decorative circle -->
<div class="absolute -bottom-2 -right-2 w-12 h-12 bg-surface-container-highest rounded-full flex items-center justify-center border border-secondary/20 backdrop-blur-md">
<span class="material-symbols-outlined text-secondary text-xl">auto_stories</span>
</div>
</div>
<!-- Typography -->
<h2 class="text-2xl font-bold text-on-surface mb-3 tracking-tight">Chưa có gì ở đây</h2>
<p class="text-sm text-on-surface-variant max-w-[280px] leading-relaxed mb-10">
            Hãy bắt đầu hành trình đầu tiên của bạn để khám phá những lời dạy sâu sắc và kiến thức thiêng liêng.
        </p>
<!-- CTA Button -->
<button class="gold-gradient text-on-secondary px-12 py-4 rounded-xl font-bold text-base shadow-lg shadow-secondary/10 active:scale-95 transition-transform">
            Bắt đầu
        </button>
</main>
<!-- BottomNavBar (Disabled/Ghost State for Empty Journey) -->
<!-- Applying style_shell_layout, style_bg_color, style_shadows_and_elevation -->
<nav class="fixed bottom-0 w-full z-50 rounded-t-2xl bg-[#1d1f2a]/90 backdrop-blur-xl shadow-[0_-4px_24px_rgba(11,14,24,0.06)] flex justify-around items-center h-20 pb-safe px-6">
<!-- Home (Inactive) -->
<a class="flex flex-col items-center justify-center text-[#e1e1f1]/60 px-4 py-1 hover:text-[#f8bd45] active:scale-90 transition-transform" href="#">
<span class="material-symbols-outlined mb-1">home</span>
<span class="font-['Be_Vietnam_Pro'] text-[10px] uppercase tracking-[0.05em] font-medium">Home</span>
</a>
<!-- Study (Inactive) -->
<a class="flex flex-col items-center justify-center text-[#e1e1f1]/60 px-4 py-1 hover:text-[#f8bd45] active:scale-90 transition-transform" href="#">
<span class="material-symbols-outlined mb-1">menu_book</span>
<span class="font-['Be_Vietnam_Pro'] text-[10px] uppercase tracking-[0.05em] font-medium">Study</span>
</a>
<!-- Progress (Inactive) -->
<a class="flex flex-col items-center justify-center text-[#e1e1f1]/60 px-4 py-1 hover:text-[#f8bd45] active:scale-90 transition-transform" href="#">
<span class="material-symbols-outlined mb-1">auto_graph</span>
<span class="font-['Be_Vietnam_Pro'] text-[10px] uppercase tracking-[0.05em] font-medium">Progress</span>
</a>
<!-- Profile (Inactive) -->
<a class="flex flex-col items-center justify-center text-[#e1e1f1]/60 px-4 py-1 hover:text-[#f8bd45] active:scale-90 transition-transform" href="#">
<span class="material-symbols-outlined mb-1">person</span>
<span class="font-['Be_Vietnam_Pro'] text-[10px] uppercase tracking-[0.05em] font-medium">Profile</span>
</a>
</nav>
<!-- Background Decor (The Illuminated Depth) -->
<div class="fixed top-[-10%] right-[-10%] w-[50%] h-[40%] rounded-full bg-secondary/5 blur-[120px] pointer-events-none z-0"></div>
<div class="fixed bottom-[-5%] left-[-5%] w-[40%] h-[30%] rounded-full bg-primary/5 blur-[100px] pointer-events-none z-0"></div>
</body></html>
