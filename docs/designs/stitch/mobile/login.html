<style>

            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

            -webkit-text-fill-color: transparent;
        }

<body class="bg-surface text-on-surface font-body overflow-hidden h-screen flex flex-col">
<!-- Top Navigation Bar (Suppressed based on Transactional Screen Rule) -->
<header class="flex items-center px-4 h-16 w-full fixed top-0 z-50 bg-[#11131e]">
<span class="material-symbols-outlined text-[#f8bd45] cursor-pointer active:scale-95 duration-200">arrow_back</span>
</header>
<main class="flex-1 flex flex-col items-center justify-between sacred-gradient relative overflow-hidden">
<!-- Hero Section (40%) -->
<section class="h-[40%] w-full flex flex-col items-center justify-center px-8 z-10">
<h1 class="font-serif text-[40px] font-bold gold-shimmer tracking-tight mb-2">
                BibleQuiz
            </h1>
<p class="font-headline text-lg font-semibold text-on-surface text-center tracking-wide">
                Học Kinh Thánh cùng anh chị em
            </p>
<p class="font-body text-sm text-on-surface-variant/70 mt-1">
                Miễn phí, không quảng cáo
            </p>
</section>
<!-- Middle Section: Geometric Path -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-full h-[200px] geometric-path pointer-events-none"></div>
<!-- Bottom Section (40%) -->
<section class="h-[45%] w-full flex flex-col items-center justify-start px-6 z-10 space-y-6">
<!-- Google Login CTA -->
<button class="w-full h-14 bg-white text-[#11131e] rounded-xl flex items-center justify-center space-x-3 font-semibold text-base transition-all active:scale-[0.98] shadow-lg shadow-black/20">
<img alt="Google Logo" class="w-6 h-6" data-alt="Google colorful G logo centered on white background for authentication" src="https://lh3.googleusercontent.com/aida-public/AB6AXuC_eqDpmbLdTIyJy7gPqjaq1ucsolt3VItCrlWS7Mok7vR-9ozP-N0jYCfM80yu41VRHWHFFijaDhmluCReH-YqVyOdx-UOfjJxWLU1BrHx9CpsIGLCuFfjIA2aHHoUifzHoOikLDDva9fykOQVdCskv3_uzvu5z9oiRTpWKmnAsEL9yDaYE2dnjIvjsPVwaZnwZglpJSVd5-CQ8dRnrT8_LSjNRmfbGgro6HDf2jfk-USYmzYGuidyTPhnQhYSi7SrbJMrcK9SFNw"/>
<span>Tiếp tục với Google</span>
</button>
<!-- Divider -->
<div class="w-full flex items-center justify-center space-x-4">
<div class="h-[0.5px] flex-1 bg-outline-variant/30"></div>
<span class="text-on-surface-variant text-sm font-label uppercase tracking-widest">hoặc</span>
<div class="h-[0.5px] flex-1 bg-outline-variant/30"></div>
</div>
<!-- Email Login -->
<button class="w-full h-14 border border-secondary/40 rounded-xl flex items-center justify-center space-x-2 text-secondary font-medium transition-all hover:bg-secondary/5 active:scale-[0.98]">
<span class="material-symbols-outlined text-sm">mail</span>
<span>Đăng nhập bằng email</span>
</button>
<!-- Registration Link -->
<div class="text-center pt-2">
<p class="text-on-surface-variant text-sm">
                    Chưa có tài khoản? 
                    <a class="text-secondary font-bold ml-1 hover:underline decoration-secondary/30 transition-all" href="#">Đăng ký</a>
</p>
</div>
<!-- Footer Microcopy -->
<footer class="pt-8 pb-4 text-center max-w-[280px]">
<p class="text-[10px] leading-relaxed text-on-surface-variant/60">
                    Khi đăng nhập, bạn đồng ý với 
                    <a class="text-secondary underline decoration-secondary/30" href="#">Điều khoản</a> 
                    và 
                    <a class="text-secondary underline decoration-secondary/30" href="#">Chính sách bảo mật</a>
</p>
</footer>
</section>
</main>
<!-- Glass Overlay Decoration (Sacred Modernist Style) -->
<div class="absolute -top-20 -right-20 w-64 h-64 bg-secondary/5 rounded-full blur-[100px] pointer-events-none"></div>
